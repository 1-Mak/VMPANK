# Marzban панель + Xray-core (FR-3). Слушает только 127.0.0.1 — панель НЕ должна
# быть доступна из интернета по HTTP (О-3 / FR-3.3). Доступ через SSH-туннель:
#   ssh -L 8000:127.0.0.1:8000 <user>@<vps>
#
# Тег образа и версия Xray запинены через .env в этой папке (FR-3.1).

services:
  marzban:
    image: gozargah/marzban:${MARZBAN_VERSION}
    restart: always              # переживает ребут VPS (FR-3.4 / NFR-3)
    env_file: .env
    environment:
      UVICORN_HOST: 127.0.0.1    # bind только на localhost (О-3)
      UVICORN_PORT: ${MARZBAN_PORT}
      XRAY_JSON: /var/lib/marzban/xray_config.json
      XRAY_EXECUTABLE_PATH: /usr/local/bin/xray
    ports:
      - "127.0.0.1:${MARZBAN_PORT}:${MARZBAN_PORT}"
    volumes:
      - marzban-data:/var/lib/marzban       # БД + конфиги персистентны (FR-3.4)
      - ./xray_config.json:/var/lib/marzban/xray_config.json:ro

volumes:
  marzban-data:
