---
# Полный подъём сервера (FR-2, FR-3, FR-5). Идемпотентно — безопасно перезапускать (NFR-1).
- name: Harden + deploy VPN server
  hosts: vpn
  become: true
  gather_facts: true
  vars:
    # Дефолты; переопределяются vpnctl через --extra-vars.
    ssh_hardened_port: 22
    awg_port: 51820
    awg_deploy_mode: same-host
    marzban_port: 8000
    marzban_version: v0.8.4
    xray_version: 26.3.27
    marzban_panel_domain: ""
    operator_ssh_key: ""
  roles:
    - role: harden
    - role: docker
    - role: marzban
    - role: awg
      when: awg_deploy_mode == 'same-host'
