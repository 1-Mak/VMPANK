---
# Деплой Marzban через Docker Compose (FR-3). Панель слушает только 127.0.0.1 (О-3).
- name: Создать директорию Marzban
  ansible.builtin.file:
    path: /opt/marzban
    state: directory
    mode: "0750"

- name: Отрендерить docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/marzban/docker-compose.yml
    mode: "0640"

- name: Отрендерить .env Marzban (bootstrap админа + версии)
  ansible.builtin.template:
    src: env.j2
    dest: /opt/marzban/.env
    mode: "0600"          # секретный файл (FR-9.3)

- name: Выкатить сгенерированный xray_config.json (VLESS+Reality) (FR-4)
  ansible.builtin.copy:
    src: "{{ reality_config_path }}"
    dest: /opt/marzban/xray_config.json
    mode: "0640"
  notify: Restart marzban

- name: Запустить Marzban
  community.docker.docker_compose_v2:
    project_src: /opt/marzban
    state: present

- name: Дождаться панели на localhost (наружу не выставлена)
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ marzban_port }}"
    timeout: 120
