---
# Deploy Marzban via Docker Compose (FR-3). Panel binds 127.0.0.1 only (О-3).
- name: Create Marzban directory
  ansible.builtin.file:
    path: /opt/marzban
    state: directory
    mode: "0750"

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/marzban/docker-compose.yml
    mode: "0640"

- name: Render Marzban .env (admin bootstrap + versions)
  ansible.builtin.template:
    src: env.j2
    dest: /opt/marzban/.env
    mode: "0600"          # secret file (FR-9.3)

- name: Push generated xray_config.json (VLESS+Reality) (FR-4)
  ansible.builtin.copy:
    src: "{{ reality_config_path }}"
    dest: /opt/marzban/xray_config.json
    mode: "0640"
  notify: Restart marzban

- name: Start Marzban
  community.docker.docker_compose_v2:
    project_src: /opt/marzban
    state: present

- name: Wait for panel on localhost (not exposed publicly)
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ marzban_port }}"
    timeout: 120
